# This is workflow
name: Hello

# runs on trigger
on:
  workflow_dispatch:     # will run on trigger
  # push:                # Automated
    # branches: [main]
    
# these are jobs inside the workflow
jobs:
  
  greet:
  # github runnner, each jobs runs on runner
    runs-on: ubuntu-latest                  
    steps:
      - name: say hellow to user
        run: echo "Hello Dost"

      - name: say hello to username
        run: echo "Hellow $user"
  
  details:
    runs-on: ubuntu-latest
    steps:
      - name: version of python, etc
        run: docker --version && python --version

      
  
